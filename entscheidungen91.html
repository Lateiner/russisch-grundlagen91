<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entscheidungs-Matrix: Kasus-Regeln</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        h1 { text-align: center; font-size: 1.5rem; margin-bottom: 10px; }
        .intro { text-align: center; margin-bottom: 30px; line-height: 1.4; color: #555; }

        /* Matrix/Tabellen-Styling */
        .matrix {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .matrix thead {
            background-color: var(--primary);
            color: white;
        }

        .matrix th, .matrix td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .matrix th { font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }

        .sentence-cell { font-size: 1.1rem; font-weight: 500; }
        .highlight { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* Entscheidungs-Buttons */
        .option-container {
            display: flex;
            gap: 10px;
        }

        .decision-btn {
            padding: 10px 15px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            flex: 1;
            font-size: 0.9rem;
            text-align: center;
        }

        .decision-btn:hover { border-color: var(--accent); color: var(--accent); }
        
        .decision-btn.selected-correct {
            background-color: var(--success);
            border-color: var(--success);
            color: white;
        }

        .decision-btn.selected-wrong {
            background-color: var(--error);
            border-color: var(--error);
            color: white;
        }

        .feedback-text {
            display: none;
            font-size: 0.85rem;
            margin-top: 5px;
            color: #666;
            font-style: italic;
        }

        /* Mobile Anpassung: Aus Tabelle wird Karte */
        @media (max-width: 768px) {
            .matrix thead { display: none; }
            .matrix, .matrix tbody, .matrix tr, .matrix td { display: block; width: 100%; }
            .matrix tr { margin-bottom: 20px; border: 1px solid #ddd; border-radius: 12px; padding: 10px; }
            .matrix td { border: none; padding: 10px 5px; }
            .sentence-cell { border-bottom: 1px solid #eee !important; margin-bottom: 10px; }
            .option-container { flex-direction: column; }
        }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn-reset {
            padding: 12px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Kasus-Entscheidung</h1>
    <p class="intro">
        In welchem Kasus steht das Substantiv nach der Zahl? <br>
        Wähle: <b>Genitiv Plural</b> (Regel für Nom/Akk) oder <b>Gleicher Fall</b> (Kongruenz bei Obliquen Fällen).
    </p>

    <table class="matrix">
        <thead>
            <tr>
                <th width="50%">Satz / Beleg</th>
                <th width="50%">Entscheidung</th>
            </tr>
        </thead>
        <tbody id="matrix-body">
            <!-- Reihen werden per JS eingefügt -->
        </tbody>
    </table>

    <div class="controls">
        <button class="btn-reset" onclick="resetMatrix()">Matrix zurücksetzen</button>
    </div>
</div>

<script>
    const data = [
        {
            sentence: "В списке нет <span class='highlight'>двухсот сотрудников</span>.",
            correct: "genPl",
            expl: "Hunderter im Genitiv verlangen danach den Genitiv Plural."
        },
        {
            sentence: "Он помог <span class='highlight'>двумстам сотрудникам</span>.",
            correct: "same",
            expl: "Dativ (двумстам) verlangt Kongruenz -> Substantiv auch im Dativ."
        },
        {
            sentence: "Я вижу <span class='highlight'>пятьсот актрис</span>.",
            correct: "genPl",
            expl: "Nach Nom/Akk (пятьсот) steht das Substantiv im Genitiv Plural."
        },
        {
            sentence: "Он интересуется <span class='highlight'>пятьюстами актерами</span>.",
            correct: "same",
            expl: "Instrumental (пятьюстами) verlangt Kongruenz -> Substantiv im Instrumental."
        },
        {
            sentence: "Мы говорили о <span class='highlight'>двухстах сотрудниках</span>.",
            correct: "same",
            expl: "Präpositiv (двухстах) verlangt Kongruenz -> Substantiv im Präpositiv."
        },
        {
            sentence: "В городе <span class='highlight'>тысяча конвертов</span>.",
            correct: "genPl",
            expl: "Wörter wie 'тысяча' verlangen in ALLEN Fällen den Genitiv Plural."
        },
        {
            sentence: "Помощь <span class='highlight'>миллиону студентов</span>.",
            correct: "genPl",
            expl: "'Миллион' wird wie ein Substantiv behandelt: Danach immer Genitiv Plural."
        }
    ];

    function initMatrix() {
        const body = document.getElementById('matrix-body');
        body.innerHTML = '';

        data.forEach((item, index) => {
            const tr = document.createElement('tr');
            
            tr.innerHTML = `
                <td class="sentence-cell">${item.sentence}</td>
                <td>
                    <div class="option-container">
                        <button class="decision-btn" onclick="makeDecision(${index}, 'genPl', this)">Genitiv Plural</button>
                        <button class="decision-btn" onclick="makeDecision(${index}, 'same', this)">Gleicher Fall</button>
                    </div>
                    <div id="expl-${index}" class="feedback-text">${item.expl}</div>
                </td>
            `;
            body.appendChild(tr);
        });
    }

    function makeDecision(index, choice, btn) {
        const row = btn.parentElement;
        const buttons = row.querySelectorAll('.decision-btn');
        const feedback = document.getElementById(`expl-${index}`);
        const correctChoice = data[index].correct;

        // Buttons deaktivieren
        buttons.forEach(b => {
            b.disabled = true;
            b.classList.remove('selected-correct', 'selected-wrong');
        });

        if (choice === correctChoice) {
            btn.classList.add('selected-correct');
        } else {
            btn.classList.add('selected-wrong');
            // Zeige dem User trotzdem den richtigen Weg
            buttons.forEach(b => {
                if (b.innerText.toLowerCase().includes(correctChoice === 'genPl' ? 'genitiv' : 'fall')) {
                    // (Optional) Markiere den korrekten Button leicht
                }
            });
        }

        feedback.style.display = 'block';
    }

    function resetMatrix() {
        initMatrix();
    }

    initMatrix();
</script>

</body>
</html>
