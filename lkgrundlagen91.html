<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabel-Lernkartei: Russisch</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --light-green: #e8f5e9;
            --accent-green: #4caf50;
            --shadow-color: rgba(0, 0, 0, 0.2);
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-green);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: var(--primary-green);
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .progress {
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--primary-green);
            font-size: 1.1rem;
        }

        /* 3D Card Styling */
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            margin: 0 auto 30px auto;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 8px 25px var(--shadow-color);
            border-radius: 15px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 15px;
            background: var(--card-bg);
            border: 2px solid var(--primary-green);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #f9f9f9;
        }

        .card-content {
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            max-width: 100%;
        }

        .front-text {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-green);
        }

        .back-text {
            font-size: 1.8rem;
            color: #333;
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            grid-column: span 2;
            gap: 20px;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            background-color: var(--primary-green);
            color: white;
            font-weight: bold;
            flex: 1;
        }

        button:hover {
            background-color: var(--accent-green);
        }

        button:active {
            transform: scale(0.98);
        }

        .secondary-btn {
            background-color: #546e7a;
        }

        .secondary-btn:hover {
            background-color: #78909c;
        }

        .shortcuts-info {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #666;
        }

        @media (max-width: 480px) {
            .front-text { font-size: 1.5rem; }
            .back-text { font-size: 1.3rem; }
            .flashcard-container { height: 250px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Vokabeltrainer</h1>
    <div class="progress" id="progress">1 / 70</div>

    <div class="flashcard-container" id="cardContainer">
        <div class="flashcard" id="flashcard">
            <div class="card-face card-front">
                <div class="card-content front-text" id="frontText">Lädt...</div>
            </div>
            <div class="card-face card-back">
                <div class="card-content back-text" id="backText">Loading...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="nav-buttons">
            <button id="prevBtn">← Vorherige</button>
            <button id="nextBtn">Nächste →</button>
        </div>
        <button class="secondary-btn" id="shuffleBtn">Mischen 🔀</button>
        <button class="secondary-btn" id="startBtn">An den Anfang 🏠</button>
    </div>

    <div class="shortcuts-info">
        Tastatur: ← → zum Navigieren | Leertaste/Enter zum Umdrehen | Pos1 für Anfang
    </div>
</div>

<script>
    // Die Vokabelliste
    const rawData = [
        ["двéсти", "zweihundert"],
        ["три́ста", "dreihundert"],
        ["четы́реста", "vierhundert"],
        ["пятьсóт", "fünfhundert"],
        ["шестьсóт", "sechshundert"],
        ["семьсóт", "siebenhundert"],
        ["восемьсóт", "achthundert"],
        ["девятьсóт", "neunhundert"],
        ["ты́сяча", "tausend"],
        ["миллиóн", "eine Million"],
        ["миллиáрд", "eine Milliarde"],
        ["количественное числи́тельное", "Kardinalzahl"],
        ["падéж", "Fall / Kasus"],
        ["имени́тельный падéж", "Nominativ"],
        ["роди́тельный падéж", "Genitiv"],
        ["дáтельный падéж", "Dativ"],
        ["вини́тельный падéж", "Akkusativ"],
        ["твори́тельный падéж", "Instrumental"],
        ["предлóжный падéж", "Präpositiv"],
        ["изменя́ть/измени́ть", "deklinieren / ändern"],
        ["склоня́ть/просклоня́ть", "beugen / deklinieren"],
        ["понимáть/поня́ть", "verstehen"],
        ["расскáзывать/рассказáть", "erzählen"],
        ["говóрить/поговори́ть", "sprechen"],
        ["произноси́ть/произнести́", "aussprechen"],
        ["стáвить/постáвить", "setzen / stellen"],
        ["ударéние", "Betonung"],
        ["сотру́дник", "Mitarbeiter"],
        ["компáния", "Firma / Unternehmen"],
        ["спи́сок", "Liste"],
        ["директор", "Direktor"],
        ["подарóк", "Geschenk"],
        ["подготáвливать/подготóвить", "vorbereiten"],
        ["ви́деть/уви́деть", "sehen"],
        ["здáние", "Gebäude"],
        ["совещáние", "Besprechung / Sitzung"],
        ["логи́ка", "Logik"],
        ["существи́тельное", "Substantiv"],
        ["прилагáтельное", "Adjektiv"],
        ["множественное числó", "Mehrzahl / Plural"],
        ["актри́са", "Schauspielerin"],
        ["актёр", "Schauspieler"],
        ["теáтр", "Theater"],
        ["дари́ть/подари́ть", "schenken"],
        ["цветок", "Blume"],
        ["режиссёр", "Regisseur"],
        ["интересовáться/поинтересовáться", "sich interessieren"],
        ["óпытный", "erfahren"],
        ["пу́тать/спýтать", "verwechseln"],
        ["конвéрт", "Briefumschlag"],
        ["пóчта", "Post"],
        ["подходи́ть/подойти́", "herantreten / hingehen"],
        ["брáть/взя́ть", "nehmen"],
        ["гóрод", "Stadt"],
        ["Росси́я", "Russland"],
        ["достопримечáтельность", "Sehenswürdigkeit"],
        ["упрáжнение", "Übung"],
        ["проверя́ть/прове́рить", "prüfen / kontrollieren"],
        ["использовáть", "verwenden / benutzen"],
        ["описáние", "Beschreibung"],
        ["остáвливать/остáвить", "hinterlassen / lassen"],
        ["пóльзователь", "Nutzer / User"],
        ["горди́ться", "stolz sein"],
        ["рабóтник", "Arbeiter / Mitarbeiter"],
        ["спрáшивать/спроси́ть", "fragen"],
        ["писáть/написáть", "schreiben"],
        ["учи́тывать/уче́сть", "berücksichtigen"],
        ["назывáть/назвáть", "nennen / bezeichnen"],
        ["желáть/пожелáть", "wünschen"],
        ["удáча", "Glück / Erfolg"]
    ];

    let cards = rawData.map(item => ({ front: item[0], back: item[1] }));
    let currentIndex = 0;

    const flashcard = document.getElementById('flashcard');
    const frontText = document.getElementById('frontText');
    const backText = document.getElementById('backText');
    const progress = document.getElementById('progress');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('next-btn'); // ID Fix im JS
    const shuffleBtn = document.getElementById('shuffleBtn');
    const startBtn = document.getElementById('startBtn');

    // Korrektur ID-Handling
    const btnNext = document.getElementById('nextBtn');

    function updateCard() {
        // Reset flip state when changing card
        flashcard.classList.remove('is-flipped');
        
        setTimeout(() => {
            const card = cards[currentIndex];
            frontText.innerText = card.front;
            backText.innerText = card.back;
            progress.innerText = `${currentIndex + 1} / ${cards.length}`;
            
            // Dynamische Schriftgröße
            adjustFontSize(frontText, card.front);
            adjustFontSize(backText, card.back);
        }, flashcard.classList.contains('is-flipped') ? 300 : 0);
    }

    function adjustFontSize(element, text) {
        if (text.length > 25) {
            element.style.fontSize = "1.2rem";
        } else if (text.length > 15) {
            element.style.fontSize = "1.5rem";
        } else {
            element.style.fontSize = ""; // Reset to CSS default
        }
    }

    function flipCard() {
        flashcard.classList.toggle('is-flipped');
    }

    function nextCard() {
        if (currentIndex < cards.length - 1) {
            currentIndex++;
            updateCard();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    }

    function shuffleCards() {
        for (let i = cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        currentIndex = 0;
        updateCard();
    }

    function goToStart() {
        currentIndex = 0;
        updateCard();
    }

    // Event Listeners
    document.getElementById('cardContainer').addEventListener('click', flipCard);
    btnNext.addEventListener('click', nextCard);
    prevBtn.addEventListener('click', prevCard);
    shuffleBtn.addEventListener('click', shuffleCards);
    startBtn.addEventListener('click', goToStart);

    // Keyboard Controls
    document.addEventListener('keydown', (e) => {
        if (e.key === " " || e.key === "Enter") {
            e.preventDefault(); // Verhindert Scrolling bei Leertaste
            flipCard();
        } else if (e.key === "ArrowRight") {
            nextCard();
        } else if (e.key === "ArrowLeft") {
            prevCard();
        } else if (e.key === "Home") {
            goToStart();
        }
    });

    // Initial Load
    updateCard();
</script>

</body>
</html>
